<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheelchair Detector</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif;overflow:hidden}
#status{position:fixed;top:10px;left:10px;right:10px;z-index:999;background:rgba(0,0,0,.75);padding:12px;border-radius:12px;font-size:14px}
#container{position:relative;width:100vw;height:100vh}
video{display:none}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="status">초기화 중...</div>
<div id="container">
<video id="webcam" autoplay playsinline muted></video>
<canvas id="display_canvas"></canvas>
</div>

<script>
const video=document.getElementById("webcam");
const canvas=document.getElementById("display_canvas");
const ctx=canvas.getContext("2d");
const statusDiv=document.getElementById("status");

let session;
const MODEL_SIZE=640;
const labels=["person","wheelchair"];

async function startApp(){
 try{
   const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}},
      audio:false
   });

   video.srcObject=stream;
   await video.play();

   canvas.width=video.videoWidth||640;
   canvas.height=video.videoHeight||480;

   statusDiv.innerText="best.onnx 로딩중...";

   session=await ort.InferenceSession.create("/best.onnx",{
      executionProviders:["webgl","wasm"]
   });

   statusDiv.innerText="모델 로드 성공";

   requestAnimationFrame(processFrame);

 }catch(err){
   console.error(err);
   statusDiv.innerText="오류: "+err.message;
 }
}

function preprocess(){
 const temp=document.createElement("canvas");
 temp.width=MODEL_SIZE;
 temp.height=MODEL_SIZE;

 const tctx=temp.getContext("2d");
 tctx.drawImage(video,0,0,MODEL_SIZE,MODEL_SIZE);

 const img=tctx.getImageData(0,0,MODEL_SIZE,MODEL_SIZE);
 const data=img.data;

 const input=new Float32Array(MODEL_SIZE*MODEL_SIZE*3);

 for(let i=0;i<MODEL_SIZE*MODEL_SIZE;i++){
   input[i]=data[i*4]/255.0;
   input[i+MODEL_SIZE*MODEL_SIZE]=data[i*4+1]/255.0;
   input[i+MODEL_SIZE*MODEL_SIZE*2]=data[i*4+2]/255.0;
 }

 return new ort.Tensor("float32",input,[1,3,MODEL_SIZE,MODEL_SIZE]);
}

let shownShape=false;

async function processFrame(){

 if(video.readyState===video.HAVE_ENOUGH_DATA){

   ctx.drawImage(video,0,0,canvas.width,canvas.height);

   try{

     const tensor=preprocess();

     const feeds={};
     feeds[session.inputNames[0]]=tensor;

     const outputs=await session.run(feeds);
     const output=outputs[session.outputNames[0]];

     if(!shownShape){
        shownShape=true;
        statusDiv.innerText="OUTPUT SHAPE: "+JSON.stringify(output.dims);
     }

   }catch(err){
      console.error(err);
      statusDiv.innerText="추론 오류: "+err.message;
   }
 }

 requestAnimationFrame(processFrame);
}

window.onload=startApp;
</script>
</body>
</html>
