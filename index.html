<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 비전: 실시간 사물 인식기_쌤용</title>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        /* 글로벌 스타일 & 네온 테마 배경 */
        body {
            font-family: 'Segoe UI', Roboto, 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #1e1b4b 0%, #090514 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* 메인 타이틀: 그라데이션 및 텍스트 글로우 효과 */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2px;
            background: linear-gradient(135deg, #38bdf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            text-align: center;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: #a78bfa;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0.8;
        }

        /* 웅장한 네온 로딩 애니메이션이 포함된 상태 창 */
        #status {
            font-weight: 600;
            background: rgba(30, 41, 59, 0.7);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(167, 139, 250, 0.3);
            margin-bottom: 25px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.15), inset 0 0 10px rgba(255,255,255,0.05);
            transition: all 0.4s ease;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(192, 132, 252, 0.15); }
            50% { transform: scale(1.02); box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); }
        }

        /* 디바이스 프레임: 공학적이고 미래지향적인 캔버스 컨테이너 */
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 540px; 
            aspect-ratio: 4 / 3; 
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 
                        0 0 40px rgba(56, 189, 248, 0.25);
            border: 2px solid rgba(56, 189, 248, 0.4);
            transition: border-color 0.5s ease;
        }

        /* 비디오 원본은 숨김 */
        video { display: none; } 

        /* 캔버스 스타일 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 장식용 SF 스타일 코너 데코레이션 (감성 추가) */
        #canvas-container::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 12px;
            height: 12px;
            border-top: 2px solid #38bdf8;
            border-left: 2px solid #38bdf8;
            z-index: 10;
            pointer-events: none;
        }
        #canvas-container::after {
            content: '';
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-bottom: 2px solid #38bdf8;
            border-right: 2px solid #38bdf8;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>📸 AI WEBCAM VISION</h1>
    <p>Real-time Object Detection</p>

    <div id="status">🤖 모델 로딩 중... (약 14MB)</div>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="display_canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('display_canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        let session;
        const modelWidth = 640;
        const modelHeight = 640;

        const labels = ["person", "bicycle", "car", "motorcycle", "airplane", "bus", "train", "truck", "boat", "traffic light", "fire hydrant", "stop sign", "parking meter", "bench", "bird", "cat", "dog", "horse", "sheep", "cow", "elephant", "bear", "zebra", "giraffe", "backpack", "umbrella", "handbag", "tie", "suitcase", "frisbee", "skis", "snowboard", "sports ball", "kite", "baseball bat", "baseball glove", "skateboard", "surfboard", "tennis racket", "bottle", "wine glass", "cup", "fork", "knife", "spoon", "bowl", "banana", "apple", "sandwich", "orange", "broccoli", "carrot", "hot dog", "pizza", "donut", "cake", "chair", "couch", "potted plant", "bed", "dining table", "toilet", "tv", "laptop", "mouse", "remote", "keyboard", "cell phone", "microwave", "oven", "toaster", "sink", "refrigerator", "book", "clock", "vase", "scissors", "teddy bear", "hair drier", "toothbrush"];

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();

                statusDiv.innerText = "⚡ 그래픽 가속 장치 최적화 중...";
                session = await ort.InferenceSession.create('yolov8n.onnx', { executionProviders: ['webgl', 'wasm'] });

                statusDiv.innerText = "🎯 탐지 가동 중! 사물을 비춰보세요.";
                statusDiv.style.color = "#a78bfa";
                statusDiv.style.borderColor = "rgba(56, 189, 248, 0.6)";

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                requestAnimationFrame(processFrame);
            } catch (err) {
                statusDiv.innerText = "❌ 오류: 카메라 권한을 허용해 주세요.";
                statusDiv.style.color = "#ef4444";
                statusDiv.style.borderColor = "#ef4444";
                console.error(err);
            }
        }

        async function processFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const inputTensor = preprocess(video, modelWidth, modelHeight);

                if (inputTensor) {
                    try {
                        const outputs = await session.run({ images: inputTensor });
                        const output = outputs[Object.keys(outputs)[0]];
                        postprocess(output.data, output.dims);
                    } catch (e) {
                        console.error(e);
                    }
                }
            }
            requestAnimationFrame(processFrame);
        }

        function preprocess(img, width, height) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(img, 0, 0, width, height);

            const imgData = tempCtx.getImageData(0, 0, width, height);
            const data = imgData.data;

            const r = new Float32Array(width * height);
            const g = new Float32Array(width * height);
            const b = new Float32Array(width * height);

            for (let i = 0; i < data.length / 4; i++) {
                r[i] = data[i * 4] / 255.0;
                g[i] = data[i * 4 + 1] / 255.0;
                b[i] = data[i * 4 + 2] / 255.0;
            }

            const float32Data = new Float32Array(width * height * 3);
            float32Data.set(r, 0);
            float32Data.set(g, width * height);
            float32Data.set(b, width * height * 2);

            return new ort.Tensor('float32', float32Data, [1, 3, width, height]);
        }

        function postprocess(data, dims) {
            const numAttributes = dims[1];
            const numBoxes = dims[2];

            // 🎨 탐지 박스 컬러 테마 수정 (네온 시안색 테두리와 둥근 텍스트 배경 처리 느낌 구현)
            for (let i = 0; i < numBoxes; i += 12) {
                let maxScore = 0;
                let classId = -1;

                for (let c = 4; c < numAttributes; c++) {
                    const score = data[c * numBoxes + i];
                    if (score > maxScore) {
                        maxScore = score;
                        classId = c - 4;
                    }
                }

                if (maxScore > 0.45) {
                    const cx = data[0 * numBoxes + i] / modelWidth * canvas.width;
                    const cy = data[1 * numBoxes + i] / modelHeight * canvas.height;
                    const w = data[2 * numBoxes + i] / modelWidth * canvas.width;
                    const h = data[3 * numBoxes + i] / modelHeight * canvas.height;

                    const x = cx - w / 2;
                    const y = cy - h / 2;

                    // 화려한 사이언(Cyan) 네온 박스 선 적용
                    ctx.strokeStyle = "#06b6d4";
                    ctx.shadowColor = "#06b6d4";
                    ctx.shadowBlur = 10; // 박스 선에 빛나는 효과 부여
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);

                    // 텍스트를 그릴 때는 그림자 효과 초기화 (글자 가독성 유지)
                    ctx.shadowBlur = 0; 

                    // 텍스트 배경
                    ctx.fillStyle = "#06b6d4";
                    const text = `${labels[classId]} ${Math.round(maxScore * 100)}%`;
                    ctx.font = "bold 13px 'Segoe UI', sans-serif";
                    const textWidth = ctx.measureText(text).width;
                    ctx.fillRect(x - 1, y - 24, textWidth + 12, 22);

                    // 텍스트 글자
                    ctx.fillStyle = "#000000";
                    ctx.fillText(text, x + 5, y - 8);
                }
            }
        }

        window.onload = startApp;
    </script>
</body>
</html>
