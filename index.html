<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('display_canvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');

let session;

const modelWidth = 640;
const modelHeight = 640;

const labels = [
    "person",
    "wheelchair"
];

async function startApp() {

    try {

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{ideal:"environment"},
                width:{ideal:640},
                height:{ideal:480}
            },
            audio:false
        });

        video.srcObject = stream;
        await video.play();

        statusDiv.innerText =
        "⚡ 모델 로딩중...";

        session =
        await ort.InferenceSession.create(
            "/best.onnx",
            {
                executionProviders:[
                    "webgl",
                    "wasm"
                ]
            }
        );

        statusDiv.innerText =
        `입력:${session.inputNames[0]}
출력:${session.outputNames[0]}`;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        requestAnimationFrame(processFrame);

    }
    catch(err){

        console.error(err);

        statusDiv.innerText =
        "❌ 모델 또는 카메라 오류";
    }
}

async function processFrame(){

    if(video.readyState === video.HAVE_ENOUGH_DATA){

        ctx.drawImage(
            video,
            0,
            0,
            canvas.width,
            canvas.height
        );

        const tensor =
        preprocess(
            video,
            modelWidth,
            modelHeight
        );

        try{

            const feeds = {};

            feeds[
                session.inputNames[0]
            ] = tensor;

            const outputs =
            await session.run(feeds);

            const output =
            outputs[
                session.outputNames[0]
            ];

            statusDiv.innerText =
            "출력 Shape : " +
            JSON.stringify(output.dims);

            postprocess(
                output.data,
                output.dims
            );

        }
        catch(e){

            console.error(e);

            statusDiv.innerText =
            "❌ 추론 오류 : " +
            e.message;
        }
    }

    requestAnimationFrame(processFrame);
}

function preprocess(img,width,height){

    const temp =
    document.createElement("canvas");

    temp.width = width;
    temp.height = height;

    const tctx =
    temp.getContext("2d");

    tctx.drawImage(
        img,
        0,
        0,
        width,
        height
    );

    const imageData =
    tctx.getImageData(
        0,
        0,
        width,
        height
    );

    const data =
    imageData.data;

    const input =
    new Float32Array(
        width*height*3
    );

    for(
        let i=0;
        i<width*height;
        i++
    ){

        input[i] =
        data[i*4]/255;

        input[
            i+width*height
        ] =
        data[i*4+1]/255;

        input[
            i+width*height*2
        ] =
        data[i*4+2]/255;
    }

    return new ort.Tensor(
        "float32",
        input,
        [1,3,width,height]
    );
}

function postprocess(data,dims){

    if(
        dims.length !== 3
    ){
        return;
    }

    const numAttributes =
    dims[1];

    const numBoxes =
    dims[2];

    for(
        let i=0;
        i<numBoxes;
        i+=12
    ){

        let maxScore = 0;
        let classId = -1;

        for(
            let c=4;
            c<numAttributes;
            c++
        ){

            const score =
            data[
                c*numBoxes+i
            ];

            if(score>maxScore){

                maxScore = score;
                classId = c-4;
            }
        }

        if(maxScore < 0.45)
            continue;

        const cx =
        data[i];

        const cy =
        data[numBoxes+i];

        const w =
        data[numBoxes*2+i];

        const h =
        data[numBoxes*3+i];

        const x =
        (cx-w/2) /
        modelWidth *
        canvas.width;

        const y =
        (cy-h/2) /
        modelHeight *
        canvas.height;

        const bw =
        w/modelWidth*
        canvas.width;

        const bh =
        h/modelHeight*
        canvas.height;

        ctx.strokeStyle =
        classId===1
        ? "#00ff55"
        : "#00f2fe";

        ctx.lineWidth = 4;

        ctx.strokeRect(
            x,
            y,
            bw,
            bh
        );

        const label =
        `${labels[classId] ?? "unknown"} ${Math.round(maxScore*100)}%`;

        const tw =
        ctx.measureText(label).width;

        ctx.fillStyle =
        "#00ff55";

        ctx.fillRect(
            x,
            y-24,
            tw+10,
            22
        );

        ctx.fillStyle =
        "#000";

        ctx.fillText(
            label,
            x+4,
            y-8
        );
    }
}

window.onload = startApp;
</script>
